<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS Cyber Arena | Kirinyaga University</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0c, #1a0033);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            color: #e0e0e0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .glass {
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,242,255,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            border-left: 4px solid cyan;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo i { font-size: 2.5rem; color: cyan; }
        .logo h1 { font-size: 1.4rem; letter-spacing: 3px; }
        .user-info { display: flex; gap: 20px; align-items: center; background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 40px; }
        .badge-display { background: linear-gradient(135deg, cyan, #bc13fe); padding: 4px 12px; border-radius: 20px; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 800px) { .game-grid { grid-template-columns: 1fr; } }
        .move-buttons { display: flex; justify-content: center; gap: 20px; margin: 25px 0; flex-wrap: wrap; }
        .move-btn {
            background: linear-gradient(135deg, #16213e, #0f3460);
            border: 2px solid cyan;
            border-radius: 20px;
            padding: 20px 35px;
            cursor: pointer;
            transition: all 0.2s;
            color: cyan;
            font-weight: bold;
        }
        .move-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px cyan; }
        .result { text-align: center; padding: 15px; background: rgba(0,255,255,0.1); border-radius: 12px; margin: 15px 0; }
        .scoreboard { display: flex; justify-content: space-around; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 15px; }
        input, button {
            background: rgba(0,0,0,0.7);
            border: 1px solid cyan;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover { background: cyan; color: #000; transform: translateY(-2px); }
        .hidden { display: none; }
        .login-container { max-width: 500px; margin: 80px auto; text-align: center; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: cyan; }
        .input-group input { width: 100%; padding: 14px 15px 14px 45px; }
        .password-toggle { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: cyan; }
        .btn-primary { background: linear-gradient(135deg, cyan, #00aaff); color: #000; border: none; }
        .mode-selection { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin: 50px 0; }
        .mode-card {
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,50,80,0.8));
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            width: 280px;
            border: 2px solid cyan;
        }
        .mode-card:hover { transform: translateY(-10px) scale(1.05); box-shadow: 0 0 40px cyan; }
        .mode-card i { font-size: 4rem; color: cyan; margin-bottom: 20px; }
        .game-area { display: none; }
        .game-area.active { display: block; }
        .back-btn { margin-bottom: 20px; }
        .sticker-pack { display: flex; gap: 15px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        .sticker { background: rgba(0,0,0,0.6); border-radius: 15px; padding: 10px; cursor: pointer; transition: all 0.2s; }
        .sticker:hover { transform: scale(1.1); background: cyan; color: #000; }
        .sticker-log { max-height: 100px; overflow-y: auto; font-size: 0.8rem; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .error-msg { color: #ff6b6b; padding: 10px; text-align: center; }
        .success-msg { color: #51cf66; padding: 10px; text-align: center; }
        .match-code-container { background: rgba(0,0,0,0.6); border-radius: 15px; padding: 20px; text-align: center; margin: 20px 0; border: 2px solid cyan; }
        .match-code { font-size: 2rem; font-weight: bold; letter-spacing: 5px; font-family: monospace; color: cyan; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(0,255,255,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="glass login-container">
            <div class="logo" style="justify-content: center;">
                <i class="fas fa-university"></i>
                <h1>KIRINYAGA UNIVERSITY</h1>
            </div>
            <p>CYBER ARENA | RPS</p>
            <div id="loginMessage"></div>
            <div id="loginForm">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="loginUsername" placeholder="USERNAME"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="PASSWORD"><i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword', this)"></i></div>
                <button id="loginBtn" class="btn-primary" style="width:100%">LOGIN</button>
                <button id="showRegisterBtn" style="width:100%; margin-top:10px">REGISTER</button>
            </div>
            <div id="registerForm" style="display:none; margin-top:20px">
                <div class="input-group"><i class="fas fa-user"></i><input type="text" id="regUsername" placeholder="USERNAME"></div>
                <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="regEmail" placeholder="EMAIL"></div>
                <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="regPassword" placeholder="PASSWORD"><i class="fas fa-eye password-toggle" onclick="togglePassword('regPassword', this)"></i></div>
                <div class="input-group"><i class="fas fa-check-circle"></i><input type="password" id="regConfirmPassword" placeholder="CONFIRM PASSWORD"><i class="fas fa-eye password-toggle" onclick="togglePassword('regConfirmPassword', this)"></i></div>
                <button id="confirmRegisterBtn" class="btn-primary" style="width:100%">CREATE ACCOUNT</button>
                <button id="backToLoginBtn" style="width:100%; margin-top:10px">BACK TO LOGIN</button>
            </div>
        </div>

        <!-- Game App -->
        <div id="gameApp" class="hidden">
            <div class="header">
                <div class="logo"><i class="fas fa-university"></i><h1>KIRINYAGA RPS</h1></div>
                <div class="user-info">
                    <span class="badge-display"><i class="fas fa-trophy"></i> <span id="userBadge">Novice</span></span>
                    <span><i class="fas fa-chart-line"></i> LVL <span id="userLevel">1</span></span>
                    <span><i class="fas fa-globe"></i> <span id="onlineCount">0</span></span>
                    <button id="logoutBtn">LOGOUT</button>
                </div>
            </div>

            <!-- Mode Selection -->
            <div id="modeSelection" class="mode-selection">
                <div class="mode-card" data-mode="computer"><i class="fas fa-microchip"></i><h3>VS COMPUTER</h3></div>
                <div class="mode-card" data-mode="multiplayer"><i class="fas fa-wifi"></i><h3>MULTIPLAYER</h3></div>
            </div>

            <!-- VS Computer Mode -->
            <div id="computerMode" class="game-area">
                <button class="back-btn" onclick="showModeSelection()"><i class="fas fa-arrow-left"></i> Back</button>
                <div class="glass">
                    <h3><i class="fas fa-microchip"></i> VS COMPUTER</h3>
                    <select id="difficultySelect" style="width:100%; margin-bottom:20px">
                        <option value="easy">EASY</option><option value="medium">MEDIUM</option><option value="hard">HARD</option>
                    </select>
                    <div class="move-buttons">
                        <button class="move-btn" data-move="rock"><i class="fas fa-hand-fist"></i> ROCK</button>
                        <button class="move-btn" data-move="paper"><i class="fas fa-hand-peace"></i> PAPER</button>
                        <button class="move-btn" data-move="scissors"><i class="fas fa-hand-scissors"></i> SCISSORS</button>
                    </div>
                    <div id="computerResult" class="result"></div>
                    <div class="scoreboard"><span>YOU: <span id="userScore">0</span></span><span>CPU: <span id="computerScore">0</span></span></div>
                </div>
                <div class="glass">
                    <h3><i class="fas fa-trophy"></i> LEADERBOARD</h3>
                    <div id="leaderboardList"></div>
                </div>
            </div>

            <!-- Multiplayer Mode -->
            <div id="multiplayerMode" class="game-area">
                <button class="back-btn" onclick="showModeSelection()"><i class="fas fa-arrow-left"></i> Back</button>
                <div class="glass">
                    <h3><i class="fas fa-wifi"></i> MULTIPLAYER</h3>
                    <div id="createMatchSection"><button id="createMatchBtn" class="btn-primary" style="width:100%">CREATE NEW MATCH</button></div>
                    <div id="matchCodeDisplay" class="hidden match-code-container">
                        <p>Share this code:</p>
                        <div class="match-code" id="matchCodeValue">XXXXXX</div>
                        <button id="copyMatchCodeBtn" style="margin-top:15px"><i class="fas fa-copy"></i> COPY</button>
                    </div>
                    <div style="margin:20px 0">
                        <p>Or join match:</p>
                        <div style="display:flex; gap:10px">
                            <input type="text" id="joinMatchCode" placeholder="ENTER CODE" style="flex:2; text-transform:uppercase">
                            <button id="joinMatchBtn" style="flex:1">JOIN</button>
                        </div>
                    </div>
                    <div id="multiStatus" class="result">No active match</div>
                    <div id="multiGameArea" class="hidden">
                        <div style="text-align:center; margin:20px 0">
                            <div style="display:flex; justify-content:space-around">
                                <div><i class="fas fa-user-circle" style="font-size:3rem"></i><div id="player1Move" style="font-size:2rem">❓</div></div>
                                <div style="font-size:2rem">VS</div>
                                <div><i class="fas fa-user-circle" style="font-size:3rem"></i><div id="player2Move" style="font-size:2rem">❓</div></div>
                            </div>
                        </div>
                        <div class="move-buttons">
                            <button class="move-btn" data-mmove="rock"><i class="fas fa-hand-fist"></i></button>
                            <button class="move-btn" data-mmove="paper"><i class="fas fa-hand-peace"></i></button>
                            <button class="move-btn" data-mmove="scissors"><i class="fas fa-hand-scissors"></i></button>
                        </div>
                    </div>
                    <div class="sticker-pack">
                        <div class="sticker" data-sticker="🔥 FIRE">🔥</div>
                        <div class="sticker" data-sticker="😂 LOL">😂</div>
                        <div class="sticker" data-sticker="👍 GG">👍</div>
                        <div class="sticker" data-sticker="❤️ HEART">❤️</div>
                    </div>
                    <div id="stickerLog" class="sticker-log"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ CONFIGURATION ============
        // IMPORTANT: This is your Render backend URL
        const BACKEND_URL = 'https://rps-backend-6iq6.onrender.com';
        
        // Socket connection to Render backend
        const socket = io(BACKEND_URL, {
            transports: ['websocket', 'polling'],
            withCredentials: true
        });
        
        let currentUser = null;
        let currentMatchCode = null;
        let userScore = 0, computerScore = 0;
        
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function showModeSelection() {
            document.querySelectorAll('.game-area').forEach(area => area.classList.remove('active'));
            document.getElementById('modeSelection').style.display = 'flex';
        }
        
        function selectMode(mode) {
            document.getElementById('modeSelection').style.display = 'none';
            document.getElementById(mode + 'Mode').classList.add('active');
        }
        
        async function login(username, password) {
            try {
                const res = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = data.user;
                    localStorage.setItem('token', data.token);
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('gameApp').classList.remove('hidden');
                    document.getElementById('userBadge').textContent = currentUser.badge;
                    document.getElementById('userLevel').textContent = currentUser.level;
                    socket.emit('user-online', { userId: currentUser.id, username: currentUser.username });
                    loadLeaderboard();
                } else {
                    document.getElementById('loginMessage').innerHTML = `<div class="error-msg">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('loginMessage').innerHTML = '<div class="error-msg">Connection error</div>';
            }
        }
        
        async function register(username, email, password, confirmPassword) {
            if (!username || !email || !password) {
                document.getElementById('loginMessage').innerHTML = '<div class="error-msg">Please fill all fields</div>';
                return;
            }
            if (password !== confirmPassword) {
                document.getElementById('loginMessage').innerHTML = '<div class="error-msg">Passwords do not match</div>';
                return;
            }
            try {
                const res = await fetch(`${BACKEND_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('loginMessage').innerHTML = '<div class="success-msg">Registration successful! Please login.</div>';
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                } else {
                    document.getElementById('loginMessage').innerHTML = `<div class="error-msg">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('loginMessage').innerHTML = '<div class="error-msg">Registration failed</div>';
            }
        }
        
        async function loadLeaderboard() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/leaderboard`);
                const leaders = await res.json();
                document.getElementById('leaderboardList').innerHTML = leaders.map(l => `
                    <div class="leaderboard-item">
                        <span>#${l.rank}</span>
                        <span>${l.username}</span>
                        <span>${l.wins} wins</span>
                        <span>${l.mmr} MMR</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Leaderboard error:', error);
            }
        }
        
        async function playVsComputer(move) {
            const token = localStorage.getItem('token');
            const difficulty = document.getElementById('difficultySelect').value;
            const res = await fetch(`${BACKEND_URL}/api/game/computer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ playerMove: move, difficulty })
            });
            const data = await res.json();
            let resultText = `You: ${data.playerMove} | CPU: ${data.computerMove} → `;
            if (data.result === 'win') {
                resultText += 'YOU WIN!';
                userScore++;
                canvasConfetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else if (data.result === 'lose') {
                resultText += 'YOU LOSE!';
                computerScore++;
            } else {
                resultText += 'DRAW!';
            }
            document.getElementById('computerResult').innerHTML = resultText;
            document.getElementById('userScore').textContent = userScore;
            document.getElementById('computerScore').textContent = computerScore;
        }
        
        function logout() {
            localStorage.removeItem('token');
            currentUser = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('gameApp').classList.add('hidden');
            document.getElementById('modeSelection').style.display = 'flex';
        }
        
        function copyMatchCode() {
            const code = document.getElementById('matchCodeValue').textContent;
            navigator.clipboard.writeText(code);
            alert('Code copied!');
        }
        
        // Socket events
        socket.on('online-count', (data) => {
            document.getElementById('onlineCount').textContent = data.count;
        });
        
        socket.on('match-created', (data) => {
            currentMatchCode = data.matchCode;
            document.getElementById('matchCodeValue').textContent = data.matchCode;
            document.getElementById('matchCodeDisplay').classList.remove('hidden');
            document.getElementById('createMatchSection').classList.add('hidden');
            document.getElementById('multiStatus').innerHTML = 'Match created! Share code with opponent.';
        });
        
        socket.on('match-started', () => {
            document.getElementById('multiStatus').innerHTML = 'Match started! Make your move!';
            document.getElementById('multiGameArea').classList.remove('hidden');
            document.getElementById('matchCodeDisplay').classList.add('hidden');
            document.getElementById('createMatchSection').classList.remove('hidden');
        });
        
        socket.on('game-result', (data) => {
            document.getElementById('player1Move').innerHTML = data.hostMove === 'rock' ? '✊' : (data.hostMove === 'paper' ? '✋' : '✌️');
            document.getElementById('player2Move').innerHTML = data.opponentMove === 'rock' ? '✊' : (data.opponentMove === 'paper' ? '✋' : '✌️');
            let result = '';
            if (data.winner === 'tie') result = 'DRAW!';
            else if (data.winner === currentUser?.id) result = 'YOU WIN!';
            else result = 'YOU LOSE!';
            document.getElementById('multiStatus').innerHTML = result;
            setTimeout(() => {
                document.getElementById('multiGameArea').classList.add('hidden');
                document.getElementById('multiStatus').innerHTML = 'No active match';
                currentMatchCode = null;
            }, 3000);
        });
        
        socket.on('new-sticker', (data) => {
            const log = document.getElementById('stickerLog');
            log.innerHTML = `<div>${data.username}: ${data.sticker}</div>` + log.innerHTML;
        });
        
        socket.on('join-error', (data) => {
            document.getElementById('multiStatus').innerHTML = `<div class="error-msg">${data.error}</div>`;
        });
        
        // Event listeners
        document.getElementById('loginBtn').onclick = () => login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
        document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; };
        document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('registerForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; };
        document.getElementById('confirmRegisterBtn').onclick = () => register(document.getElementById('regUsername').value, document.getElementById('regEmail').value, document.getElementById('regPassword').value, document.getElementById('regConfirmPassword').value);
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('createMatchBtn').onclick = () => { socket.emit('create-match', { userId: currentUser?.id, username: currentUser?.username }); };
        document.getElementById('joinMatchBtn').onclick = () => { const code = document.getElementById('joinMatchCode').value.trim().toUpperCase(); if(code) socket.emit('join-match', { matchCode: code, userId: currentUser?.id, username: currentUser?.username }); };
        document.getElementById('copyMatchCodeBtn').onclick = copyMatchCode;
        
        document.querySelectorAll('[data-move]').forEach(btn => { btn.onclick = () => playVsComputer(btn.getAttribute('data-move')); });
        document.querySelectorAll('[data-mmove]').forEach(btn => { btn.onclick = () => { if(currentMatchCode) socket.emit('make-move', { matchCode: currentMatchCode, userId: currentUser?.id, move: btn.getAttribute('data-mmove') }); }; });
        document.querySelectorAll('.sticker').forEach(sticker => { sticker.onclick = () => { if(currentMatchCode) socket.emit('send-sticker', { matchCode: currentMatchCode, username: currentUser?.username, sticker: sticker.getAttribute('data-sticker') }); }; });
        document.querySelectorAll('.mode-card').forEach(card => { card.onclick = () => selectMode(card.getAttribute('data-mode')); });
        
        // Check existing token
        const token = localStorage.getItem('token');
        if (token) {
            fetch(`${BACKEND_URL}/api/verify-token`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.json()).then(data => {
                    if (data.valid) {
                        document.getElementById('loginSection').classList.add('hidden');
                        document.getElementById('gameApp').classList.remove('hidden');
                        socket.emit('user-online', { userId: data.user.id, username: data.user.username });
                    }
                });
        }
    </script>
</body>
</html>
