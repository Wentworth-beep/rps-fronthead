<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Kirinyaga University RPS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0c, #1a0033);
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: #e0e0e0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .glass {
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,242,255,0.3);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            border-left: 4px solid cyan;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo i {
            font-size: 2rem;
            color: cyan;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border-left: 3px solid cyan;
        }
        
        .stat-card i {
            font-size: 2rem;
            color: cyan;
        }
        
        .stat-card h3 {
            font-size: 2rem;
            margin: 10px 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0,242,255,0.2);
        }
        
        th {
            color: cyan;
        }
        
        button, select, input {
            background: rgba(0,0,0,0.6);
            border: 1px solid cyan;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        
        button:hover {
            background: cyan;
            color: #000;
        }
        
        .btn-danger {
            border-color: #ff4b2b;
            color: #ff4b2b;
        }
        
        .btn-danger:hover {
            background: #ff4b2b;
            color: #fff;
        }
        
        .btn-success {
            border-color: #00ff88;
            color: #00ff88;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        
        .badge-Novice { background: #666; }
        .badge-Skilled { background: #00ff88; color: #000; }
        .badge-Adept { background: #339af0; }
        .badge-Master { background: #9b59b6; }
        .badge-Legend { background: #f1c40f; color: #000; }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: cyan;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(0,0,0,0.6);
            border: 1px solid cyan;
            border-radius: 12px;
            color: white;
        }
        
        .hidden {
            display: none;
        }
        
        .admin-name {
            color: cyan;
            font-weight: bold;
        }
        
        .reports-list, .logs-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .report-item, .log-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, cyan, #00aaff);
            color: #000;
            font-weight: bold;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Admin Login Section -->
        <div id="loginSection" class="glass login-container">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <i class="fas fa-crown"></i>
                <div>
                    <h1>ADMIN PANEL</h1>
                    <p>Kirinyaga University RPS</p>
                </div>
            </div>
            <div id="loginMessage"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="adminUsername" placeholder="USERNAME" value="admin">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="PASSWORD">
                <i class="fas fa-eye password-toggle" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: cyan;" onclick="togglePassword()"></i>
            </div>
            <button id="loginBtn" class="btn-primary" style="width: 100%;">ADMIN LOGIN</button>
            <button id="backToGameBtn" style="width: 100%; margin-top: 10px; background: transparent;">BACK TO GAME</button>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboardSection" class="hidden">
            <div class="header">
                <div class="logo">
                    <i class="fas fa-crown"></i>
                    <h1>ADMIN CONTROL PANEL</h1>
                </div>
                <div>
                    <span class="admin-name"><i class="fas fa-user-shield"></i> <span id="adminName">Admin</span></span>
                    <button id="logoutBtn" style="margin-left: 15px;">LOGOUT</button>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-users"></i><h3 id="onlineCount">0</h3><p>Online Users</p></div>
                <div class="stat-card"><i class="fas fa-database"></i><h3 id="totalUsers">0</h3><p>Total Registered</p></div>
                <div class="stat-card"><i class="fas fa-flag"></i><h3 id="reportCount">0</h3><p>Abuse Reports</p></div>
                <div class="stat-card"><i class="fas fa-gamepad"></i><h3 id="activeGames">0</h3><p>Active Games</p></div>
            </div>

            <div class="glass">
                <h3><i class="fas fa-users"></i> USER MANAGEMENT</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Badge</th><th>Wins</th><th>MMR</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="usersTable"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass">
                <h3><i class="fas fa-medal"></i> BADGE MANAGEMENT</h3>
                <select id="badgeUserSelect"></select>
                <select id="assignBadgeSelect">
                    <option value="Novice">Novice</option><option value="Skilled">Skilled</option>
                    <option value="Adept">Adept</option><option value="Master">Master</option><option value="Legend">Legend</option>
                </select>
                <button id="updateBadgeBtn">ASSIGN BADGE</button>
            </div>

            <div class="glass">
                <h3><i class="fas fa-flag"></i> ABUSE REPORTS</h3>
                <div id="reportsList" class="reports-list"></div>
                <button id="clearReportsBtn" class="btn-danger">CLEAR ALL REPORTS</button>
            </div>

            <div class="glass">
                <h3><i class="fas fa-history"></i> ADMIN ACTIVITY LOG</h3>
                <div id="logsList" class="logs-list"></div>
            </div>
        </div>
    </div>

    <script>
        let adminToken = null;
        let currentAdmin = null;

        function togglePassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.querySelector('.password-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (!username || !password) {
                document.getElementById('loginMessage').innerHTML = '<div style="color: #ff4b2b;">Please enter username and password</div>';
                return;
            }
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    adminToken = data.token;
                    currentAdmin = data.admin;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('adminName').textContent = currentAdmin.username;
                    loadDashboard();
                } else {
                    document.getElementById('loginMessage').innerHTML = `<div style="color: #ff4b2b;">${data.error}</div>`;
                }
            } catch (error) {
                document.getElementById('loginMessage').innerHTML = '<div style="color: #ff4b2b;">Connection error</div>';
            }
        }

        async function loadDashboard() {
            await loadUsers();
            await loadStats();
            await loadReports();
            await loadLogs();
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users', {
                headers: { 'Authorization': `Bearer ${adminToken}` }
            });
            const users = await res.json();
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            users.forEach(user => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${user.id}</td>
                    <td><i class="fas fa-user"></i> ${user.username}</td>
                    <td>${user.email}</td>
                    <td><span class="badge badge-${user.badge}">${user.badge}</span></td>
                    <td>${user.total_wins}</td>
                    <td>${user.mmr || 500}</td>
                    <td class="${user.is_banned ? 'offline' : 'online'}">${user.is_banned ? 'BANNED' : 'ACTIVE'}</td>
                    <td><button onclick="toggleBan(${user.id}, ${!user.is_banned})" class="${user.is_banned ? 'btn-success' : 'btn-danger'}">${user.is_banned ? 'UNBAN' : 'BAN'}</button></td>
                `;
            });
            
            const select = document.getElementById('badgeUserSelect');
            select.innerHTML = '<option value="">Select User</option>';
            users.filter(u => u.role !== 'admin').forEach(u => {
                select.innerHTML += `<option value="${u.id}">${u.username} (${u.badge})</option>`;
            });
        }

        async function loadStats() {
            const online = await fetch('/api/admin/online-count', { headers: { 'Authorization': `Bearer ${adminToken}` } });
            const onlineData = await online.json();
            document.getElementById('onlineCount').textContent = onlineData.count;
            
            const total = await fetch('/api/admin/total-users', { headers: { 'Authorization': `Bearer ${adminToken}` } });
            const totalData = await total.json();
            document.getElementById('totalUsers').textContent = totalData.count;
            document.getElementById('activeGames').textContent = Math.floor(Math.random() * 20);
        }

        async function loadReports() {
            const res = await fetch('/api/admin/reports', { headers: { 'Authorization': `Bearer ${adminToken}` } });
            const reports = await res.json();
            document.getElementById('reportCount').textContent = reports.length;
            const container = document.getElementById('reportsList');
            container.innerHTML = reports.length === 0 ? '<div style="text-align: center; padding: 20px;">No reports</div>' :
                reports.map(r => `<div class="report-item"><strong>${r.reported_name}</strong> reported by <strong>${r.reporter_name}</strong><br>Reason: ${r.reason}<br><small>${new Date(r.created_at).toLocaleString()}</small></div>`).join('');
        }

        async function loadLogs() {
            const res = await fetch('/api/admin/logs', { headers: { 'Authorization': `Bearer ${adminToken}` } });
            const logs = await res.json();
            const container = document.getElementById('logsList');
            container.innerHTML = logs.length === 0 ? '<div style="text-align: center; padding: 20px;">No logs</div>' :
                logs.map(log => `<div class="log-item"><strong>${log.action}</strong> - ${log.details || ''}<br><small>Admin: ${log.admin_name} | ${new Date(log.created_at).toLocaleString()}</small></div>`).join('');
        }

        window.toggleBan = async (userId, ban) => {
            await fetch('/api/admin/ban-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId, ban })
            });
            loadUsers();
        };

        async function updateBadge() {
            const userId = document.getElementById('badgeUserSelect').value;
            const badge = document.getElementById('assignBadgeSelect').value;
            if (!userId) return;
            await fetch('/api/admin/update-badge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${adminToken}` },
                body: JSON.stringify({ userId, badge })
            });
            loadUsers();
        }

        async function clearReports() {
            if (!confirm('Clear all abuse reports?')) return;
            await fetch('/api/admin/clear-reports', { method: 'DELETE', headers: { 'Authorization': `Bearer ${adminToken}` } });
            loadReports();
        }

        function logout() {
            localStorage.removeItem('adminToken');
            adminToken = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }

        document.getElementById('loginBtn').onclick = adminLogin;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('backToGameBtn').onclick = () => window.location.href = '/';
        document.getElementById('updateBadgeBtn').onclick = updateBadge;
        document.getElementById('clearReportsBtn').onclick = clearReports;
        
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });

        const savedToken = localStorage.getItem('adminToken');
        if (savedToken) {
            adminToken = savedToken;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadDashboard();
        }
    </script>
</body>
</html>
