<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Kirinyaga University RPS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23ffd700' rx='20'/%3E%3Ctext x='50' y='68' font-size='45' text-anchor='middle' fill='%23000'%3E👑%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #0a0a0c, #1a0033);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .glass {
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,242,255,0.3);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 25px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            border-left: 4px solid cyan;
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(0,0,0,0.5); padding: 20px; border-radius: 15px; text-align: center; border-left: 3px solid cyan; }
        .stat-card i { font-size: 2rem; color: cyan; }
        .stat-card h3 { font-size: 2rem; margin: 10px 0; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(0,242,255,0.2); }
        th { color: cyan; }
        
        button, select, input {
            background: rgba(0,0,0,0.6);
            border: 1px solid cyan;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        
        button:hover { background: cyan; color: #000; transform: translateY(-2px); }
        
        .btn-danger { border-color: #ff4b2b; color: #ff4b2b; }
        .btn-danger:hover { background: #ff4b2b; color: #fff; }
        .btn-success { border-color: #00ff88; color: #00ff88; }
        .btn-success:hover { background: #00ff88; color: #000; }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .badge-Bronze { background: #cd7f32; }
        .badge-Silver { background: #c0c0c0; color: #000; }
        .badge-Gold { background: #ffd700; color: #000; }
        .badge-Platinum { background: #00e5ff; color: #000; }
        .badge-Diamond { background: #b9f2ff; color: #000; }
        .badge-Master { background: #9b59b6; }
        .badge-Legend { background: #ff4b2b; }
        
        .login-container { max-width: 400px; margin: 100px auto; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: cyan; }
        .input-group input { width: 100%; padding: 14px 15px 14px 45px; background: rgba(0,0,0,0.6); border: 1px solid cyan; border-radius: 12px; color: white; }
        
        .hidden { display: none; }
        .btn-primary { background: linear-gradient(135deg, cyan, #00aaff); color: #000; border: none; }
        
        .status-banned { color: #ff4b2b; font-weight: bold; }
        .status-active { color: #00ff88; font-weight: bold; }
        
        /* Notification Toast */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00f2ff, #00aaff);
            color: #000;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .notification.error { background: linear-gradient(135deg, #ff4b2b, #ff6b35); color: #fff; }
        .notification.success { background: linear-gradient(135deg, #00ff88, #2ecc71); color: #000; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        
        /* Loading spinner */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: cyan;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Admin Login Section -->
        <div id="loginSection" class="glass login-container">
            <div style="text-align:center; margin-bottom:20px">
                <i class="fas fa-crown" style="font-size:3rem; color:cyan"></i>
                <h1>ADMIN PANEL</h1>
                <p>Kirinyaga University RPS</p>
            </div>
            <div id="loginMessage"></div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="adminUsername" placeholder="USERNAME" value="admin">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="PASSWORD">
                <i class="fas fa-eye" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: cyan;" onclick="togglePassword()"></i>
            </div>
            <button id="loginBtn" class="btn-primary" style="width: 100%;">ADMIN LOGIN</button>
            <button id="backToGameBtn" style="width: 100%; margin-top: 10px; background: transparent;">BACK TO GAME</button>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboardSection" class="hidden">
            <div class="header">
                <div><i class="fas fa-crown"></i> <h1 style="display:inline-block">ADMIN CONTROL PANEL</h1></div>
                <div>
                    <span><i class="fas fa-user-shield"></i> <span id="adminName"></span></span>
                    <button id="logoutBtn" style="margin-left: 15px;">LOGOUT</button>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-users"></i><h3 id="onlineCount">0</h3><p>Online Users</p></div>
                <div class="stat-card"><i class="fas fa-database"></i><h3 id="totalUsers">0</h3><p>Total Registered</p></div>
                <div class="stat-card"><i class="fas fa-ban"></i><h3 id="bannedCount">0</h3><p>Banned Users</p></div>
                <div class="stat-card"><i class="fas fa-gamepad"></i><h3 id="activeGames">0</h3><p>Active Games</p></div>
            </div>
            
            <div class="glass">
                <h3><i class="fas fa-users"></i> USER MANAGEMENT</h3>
                <div style="overflow-x:auto">
                    <table id="usersTable">
                        <thead>
                            <tr><th>ID</th><th>Username</th><th>Email</th><th>Badge</th><th>Wins</th><th>MMR</th><th>Coins</th><th>Status</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </div>
            
            <div class="glass">
                <h3><i class="fas fa-medal"></i> BADGE MANAGEMENT</h3>
                <select id="badgeUserSelect" style="min-width: 200px;"></select>
                <select id="assignBadgeSelect">
                    <option value="Bronze">🥉 Bronze</option>
                    <option value="Silver">🥈 Silver</option>
                    <option value="Gold">🥇 Gold</option>
                    <option value="Platinum">💎 Platinum</option>
                    <option value="Diamond">⬛ Diamond</option>
                    <option value="Master">👑 Master</option>
                    <option value="Legend">🏆 Legend</option>
                </select>
                <button id="updateBadgeBtn">ASSIGN BADGE</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://rps-backend-6iq6.onrender.com';
        let adminToken = null;
        let currentAdmin = null;
        
        // Notification function
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            notification.innerHTML = `<i class="fas ${icon}"></i> ${message}`;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        function togglePassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.querySelector('.fa-eye');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        async function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (!username || !password) {
                showNotification('Please enter username and password', 'error');
                return;
            }
            
            try {
                showNotification('Logging in...', 'info');
                const res = await fetch(`${BACKEND_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    adminToken = data.token;
                    currentAdmin = data.admin;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    document.getElementById('adminName').textContent = currentAdmin.username;
                    showNotification(`Welcome ${currentAdmin.username}!`, 'success');
                    loadDashboard();
                } else {
                    showNotification(data.error || 'Invalid admin credentials', 'error');
                }
            } catch (error) {
                showNotification('Connection error', 'error');
            }
        }
        
        async function loadDashboard() {
            await loadUsers();
            await loadStats();
        }
        
        async function loadUsers() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const users = await res.json();
                const tbody = document.getElementById('usersTableBody');
                tbody.innerHTML = '';
                
                let bannedCount = 0;
                
                users.forEach(user => {
                    if (user.is_banned) bannedCount++;
                    const row = tbody.insertRow();
                    row.setAttribute('data-user-id', user.id);
                    row.setAttribute('data-user-status', user.is_banned ? 'banned' : 'active');
                    
                    row.innerHTML = `
                        <td>${user.id}</td>
                        <td><i class="fas fa-user"></i> ${user.username}</td>
                        <td>${user.email}</td>
                        <td><span class="badge badge-${user.badge}">${user.badge}</span></td>
                        <td>${user.total_wins || 0}</td>
                        <td>${user.mmr || 500}</td>
                        <td>💰 ${user.coins || 500}</td>
                        <td class="${user.is_banned ? 'status-banned' : 'status-active'}">
                            ${user.is_banned ? '<i class="fas fa-ban"></i> BANNED' : '<i class="fas fa-circle"></i> ACTIVE'}
                        </td>
                        <td>
                            <button onclick="toggleBanUser(${user.id}, ${!user.is_banned})" 
                                    class="${user.is_banned ? 'btn-success' : 'btn-danger'}"
                                    id="banBtn-${user.id}">
                                ${user.is_banned ? '<i class="fas fa-check"></i> UNBAN' : '<i class="fas fa-ban"></i> BAN'}
                            </button>
                        </td>
                    `;
                });
                
                document.getElementById('bannedCount').textContent = bannedCount;
                
                const select = document.getElementById('badgeUserSelect');
                select.innerHTML = '<option value="">Select User</option>';
                users.filter(u => u.role !== 'admin').forEach(u => {
                    select.innerHTML += `<option value="${u.id}">${u.username} (Current: ${u.badge})</option>`;
                });
            } catch (error) {
                console.error('Load users error:', error);
                showNotification('Failed to load users', 'error');
            }
        }
        
        async function toggleBanUser(userId, ban) {
            const action = ban ? 'ban' : 'unban';
            const button = document.getElementById(`banBtn-${userId}`);
            const originalText = button.innerHTML;
            
            // Show loading state
            button.innerHTML = '<span class="loading"></span> Processing...';
            button.disabled = true;
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/ban-user`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ userId, ban })
                });
                
                if (res.ok) {
                    showNotification(`User has been ${ban ? 'BANNED' : 'UNBANNED'} successfully!`, 'success');
                    await loadUsers(); // Refresh the user list immediately
                } else {
                    showNotification(`Failed to ${action} user`, 'error');
                    button.innerHTML = originalText;
                    button.disabled = false;
                }
            } catch (error) {
                console.error('Ban user error:', error);
                showNotification(`Error: Could not ${action} user`, 'error');
                button.innerHTML = originalText;
                button.disabled = false;
            }
        }
        
        // Make function global for onclick
        window.toggleBanUser = toggleBanUser;
        
        async function loadStats() {
            try {
                const online = await fetch(`${BACKEND_URL}/api/admin/online-count`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const onlineData = await online.json();
                document.getElementById('onlineCount').textContent = onlineData.count || 0;
                
                const total = await fetch(`${BACKEND_URL}/api/admin/total-users`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const totalData = await total.json();
                document.getElementById('totalUsers').textContent = totalData.count || 0;
                document.getElementById('activeGames').textContent = Math.floor(Math.random() * 20);
            } catch (error) {
                console.error('Load stats error:', error);
            }
        }
        
        async function updateBadge() {
            const userId = document.getElementById('badgeUserSelect').value;
            const badge = document.getElementById('assignBadgeSelect').value;
            
            if (!userId) {
                showNotification('Please select a user', 'error');
                return;
            }
            
            const btn = document.getElementById('updateBadgeBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Updating...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/update-badge`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ userId, badge })
                });
                
                if (res.ok) {
                    showNotification(`Badge updated to ${badge} successfully!`, 'success');
                    await loadUsers();
                } else {
                    showNotification('Failed to update badge', 'error');
                }
            } catch (error) {
                showNotification('Error updating badge', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        
        function logout() {
            localStorage.removeItem('adminToken');
            adminToken = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
            showNotification('Logged out successfully', 'success');
        }
        
        // Event listeners
        document.getElementById('loginBtn').onclick = adminLogin;
        document.getElementById('logoutBtn').onclick = logout;
        document.getElementById('backToGameBtn').onclick = () => window.location.href = '/';
        document.getElementById('updateBadgeBtn').onclick = updateBadge;
        
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
        
        // Check for saved token
        const savedToken = localStorage.getItem('adminToken');
        if (savedToken) {
            adminToken = savedToken;
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadDashboard();
        }
    </script>
</body>
</html>
